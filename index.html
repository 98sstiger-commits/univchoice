<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniChoice | 필탑</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@latest/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets['react'], {
        runtime: 'classic',
        pragma: 'React.createElement',
        pragmaFrag: 'React.Fragment'
      }]]
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    [id*="accessibility"],[class*="accessibility"],[id*="userway"],[class*="userway"],
    [id*="ada"],[class*="ada"],[class*="a11y"]{display:none!important;visibility:hidden!important}

    :root {
      --navy:#1A2E55;
      --navy-mid:#2D4A80;
      --navy-lt:#EEF2F9;
      --blue:#4A90D9;
      --blue-lt:#EBF3FC;
      --green:#047857;
      --green-bg:#D1FAE5;
      --orange:#B45309;
      --orange-bg:#FEF3C7;
      --red:#B91C1C;
      --red-bg:#FEE2E2;
      --purple:#6D28D9;
      --purple-bg:#EDE9FE;
      --g50:#F9FAFB;
      --g100:#F3F4F6;
      --g200:#E5E7EB;
      --g300:#D1D5DB;
      --g400:#9CA3AF;
      --g500:#6B7280;
      --g700:#374151;
      --g900:#111827;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F4F5F7;color:var(--g900);min-height:100vh;-webkit-font-smoothing:antialiased}

    .home-wrap{max-width:520px;margin:0 auto;padding:48px 20px 60px}
    .home-top{text-align:center;margin-bottom:32px}
    .home-wordmark{font-size:28px;font-weight:800;color:var(--g900);letter-spacing:-1px;margin-bottom:4px}
    .home-wordmark span{color:var(--navy)}
    .home-sub{font-size:13px;color:var(--g400);letter-spacing:.2px}
    .home-divider{height:1px;background:var(--g200);margin-bottom:28px}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .mode-card{border-radius:16px;padding:26px 22px 22px;min-height:320px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .mode-card--s{background:var(--navy);cursor:pointer}
    .mode-card--j{background:#fff;border:1px solid var(--g200)}
    .mc-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px}
    .mode-card--s .mc-label{color:rgba(255,255,255,.45)}
    .mode-card--j .mc-label{color:var(--g300)}
    .mc-title{font-size:30px;font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:10px}
    .mode-card--s .mc-title{color:#fff}
    .mode-card--j .mc-title{color:var(--g300)}
    .mc-desc{font-size:12px;line-height:1.65;margin-bottom:20px}
    .mode-card--s .mc-desc{color:rgba(255,255,255,.5)}
    .mode-card--j .mc-desc{color:var(--g300)}
    .mc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:24px}
    .mc-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.2px}
    .mode-card--s .mc-tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
    .mode-card--j .mc-tag{background:var(--g100);color:var(--g300)}
    .mc-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s;letter-spacing:.1px}
    .mc-btn:hover{opacity:.85}
    .mc-btn--start{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
    .mc-btn--soon{background:var(--g100);color:var(--g300);cursor:default;justify-content:center}
    .mc-num{position:absolute;bottom:-14px;right:10px;font-size:90px;font-weight:800;line-height:1;letter-spacing:-4px;pointer-events:none}
    .mode-card--s .mc-num{color:rgba(255,255,255,.04)}
    .mode-card--j .mc-num{color:rgba(0,0,0,.04)}
    .home-minis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .home-mini{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px}
    .home-mini-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;color:#fff}
    .home-mini-t{font-size:12px;font-weight:600;color:var(--g700);margin-bottom:2px}
    .home-mini-s{font-size:10px;color:var(--g400)}

    .hdr{background:var(--navy);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
    .hdr-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .hdr-badge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.5px}
    .hdr-title{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.5px}
    .hdr-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.3px;margin-top:1px}
    .hdr-year{color:rgba(255,255,255,.35);font-size:12px;font-weight:600;letter-spacing:.5px}

    .steps-wrap{background:#fff;border-bottom:1px solid var(--g200);padding:13px 22px}
    .steps{max-width:620px;margin:0 auto;display:flex;align-items:center}
    .step{display:flex;align-items:center;gap:8px}
    .step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .step-num.active{background:var(--navy);color:#fff}
    .step-num.done{background:var(--green);color:#fff}
    .step-num.pending{background:var(--g200);color:var(--g400)}
    .step-lbl{font-size:12px;color:var(--g400);white-space:nowrap}
    .step-lbl.active{color:var(--navy);font-weight:700}
    .step-line{flex:1;height:1px;background:var(--g200);margin:0 8px}

    .main{max-width:640px;margin:0 auto;padding:22px 16px 110px}
    .error-box{background:var(--red-bg);border:1px solid #FECACA;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px}
    .intro{background:var(--navy);border-radius:14px;padding:22px 22px 20px;margin-bottom:16px;color:#fff}
    .intro h2{font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
    .intro p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.65;margin-bottom:16px}
    .intro-steps{display:flex;gap:0}
    .intro-step{flex:1;display:flex;align-items:center;gap:8px}
    .intro-step-icon{width:28px;height:28px;background:rgba(255,255,255,.1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;color:rgba(255,255,255,.7)}
    .intro-step-text{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}
    .intro-step-text strong{display:block;color:rgba(255,255,255,.9);font-size:12px;margin-bottom:1px}
    .intro-arrow{color:rgba(255,255,255,.2);font-size:14px;margin:0 4px}
    .card{background:#fff;border-radius:14px;padding:22px 20px;margin-bottom:14px;border:1px solid var(--g100);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--g100)}
    .sec-icon{width:32px;height:32px;background:var(--navy-lt);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--navy);flex-shrink:0}
    .sec-title{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-.2px}
    .sec-sub{font-size:11px;color:var(--g400);margin-top:2px}
    .field{margin-bottom:14px}
    .field:last-child{margin-bottom:0}
    .field-label{display:flex;align-items:center;gap:4px;margin-bottom:7px;font-size:13px;font-weight:700;color:var(--g700)}
    .required{color:var(--red)}
    .f-hint{font-weight:400;font-size:11px;color:var(--g400)}
    input[type="text"]{width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:14px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit}
    input[type="text"]:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,46,85,.08)}
    input::placeholder{color:var(--g300)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    textarea{width:100%;padding:11px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;resize:vertical;min-height:200px;line-height:1.65}
    textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,46,85,.08)}
    textarea::placeholder{color:var(--g300)}
    .char-info{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .char-warn{font-size:11px;color:var(--orange)}
    .char-cnt{font-size:11px;color:var(--g400)}
    .char-ok{font-size:11px;color:var(--green);font-weight:600}
    .notice-box{background:var(--navy-lt);border:1px solid rgba(26,46,85,.1);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
    .notice-box-icon{width:20px;height:20px;background:var(--navy);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .notice-box-icon svg{width:11px;height:11px;fill:#fff}
    .notice-box-text{font-size:12px;color:var(--navy-mid);line-height:1.6}
    .notice-box-text strong{font-weight:700;color:var(--navy)}
    .rec-tabs{display:flex;gap:4px;background:var(--g100);border-radius:8px;padding:3px;margin-bottom:14px}
    .rec-tab{flex:1;padding:8px 6px;border:none;border-radius:6px;background:transparent;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .rec-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .upload-zone{border:1.5px dashed var(--g300);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .15s;position:relative;display:block;width:100%}
    .upload-zone:hover{border-color:var(--navy);background:var(--navy-lt)}
    .upload-zone.has-file{border-color:var(--navy);background:var(--navy-lt);border-style:solid}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-title{font-size:14px;font-weight:700;color:var(--g700);margin-bottom:5px}
    .upload-zone.has-file .upload-title{color:var(--navy)}
    .upload-desc{font-size:12px;color:var(--g400);line-height:1.5}
    .upload-zone.has-file .upload-desc{color:var(--navy-mid)}
    .upload-hint{margin-top:10px;display:inline-block;background:var(--g100);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--g400)}
    .upload-zone.has-file .upload-hint{background:rgba(26,46,85,.1);color:var(--navy)}
    .chk-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--g200);border-radius:10px;cursor:pointer;transition:all .15s;user-select:none}
    .chk-opt:hover{border-color:var(--navy-mid);background:var(--navy-lt)}
    .chk-opt.on{border-color:var(--navy);background:var(--navy-lt)}
    .chk-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--g300);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .chk-box.on{background:var(--navy);border-color:var(--navy)}
    .chk-text h4{font-size:13px;font-weight:700;color:var(--g900)}
    .chk-text p{font-size:12px;color:var(--g500);margin-top:3px;line-height:1.4}

    /* 희망대학 입력 */
    .wish-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
    .wish-row input{padding:9px 12px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;width:100%}
    .wish-row input:focus{border-color:var(--navy)}
    .wish-del{width:30px;height:30px;border:none;background:var(--red-bg);color:var(--red);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .wish-add{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed var(--g300);border-radius:8px;background:transparent;color:var(--g500);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;justify-content:center}
    .wish-add:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-lt)}

    .submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid var(--g200);box-shadow:0 -4px 24px rgba(0,0,0,.08);z-index:200}
    .submit-inner{max-width:608px;margin:0 auto}
    .submit-btn{display:block;width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;transition:background .15s;font-family:inherit;letter-spacing:.1px}
    .submit-btn:hover:not(:disabled){background:var(--navy-mid)}
    .submit-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .submit-hint{text-align:center;font-size:11px;color:var(--g400);margin-top:6px}
    .field-err input,.field-err textarea{border-color:var(--red)!important}
    .err-msg{font-size:11px;color:var(--red);margin-top:4px}

    .analyzing-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff}
    .analyzing-inner{max-width:400px;padding:40px 24px;text-align:center;width:100%}
    .analyzing-spinner{width:52px;height:52px;border:3px solid var(--g200);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 28px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .analyzing-inner h2{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-.3px}
    .analyzing-inner>p{font-size:13px;color:var(--g400);margin-bottom:32px}
    .a-steps{text-align:left}
    .a-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100)}
    .a-step:last-child{border-bottom:none}
    .a-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .a-dot.done{background:var(--green-bg);color:var(--green)}
    .a-dot.active{background:var(--navy);color:#fff;animation:blink .9s infinite}
    .a-dot.pending{background:var(--g100);color:var(--g300)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .a-label{font-size:13px;font-weight:600}
    .a-label.done{color:var(--green)}.a-label.active{color:var(--navy)}.a-label.pending{color:var(--g300)}

    .result-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .result-hd h2{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
    .export-btn{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.1px;transition:background .15s}
    .export-btn:hover:not(:disabled){background:var(--navy-mid)}
    .export-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .result-strategy{font-size:11px;color:var(--g500);margin-bottom:16px;line-height:1.5}
    .result-section-title{font-size:14px;font-weight:800;color:var(--navy);margin:20px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--navy-lt)}

    .analysis-box{background:#fff;border:1px solid var(--g200);border-radius:14px;padding:18px 20px;margin-bottom:14px}
    .ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .ab-title{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:-.2px}
    .comp-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
    .ab-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .ab-metric{background:var(--g50);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--g100)}
    .ab-metric-lbl{font-size:10px;color:var(--g400);margin-bottom:4px;letter-spacing:.2px}
    .ab-metric-val{font-size:13px;font-weight:800;color:var(--navy)}
    .ab-grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .ab-grade{background:var(--navy-lt);border-radius:8px;padding:8px 10px;text-align:center}
    .ab-grade-lbl{font-size:10px;color:var(--navy-mid);margin-bottom:3px}
    .ab-grade-val{font-size:15px;font-weight:900;color:var(--navy)}
    .ab-year{display:flex;gap:8px;margin-bottom:12px}
    .ab-year-item{flex:1;background:var(--g50);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--g100)}
    .ab-year-lbl{font-size:10px;color:var(--g400);margin-bottom:3px}
    .ab-year-val{font-size:14px;font-weight:800;color:var(--navy)}
    .ab-analysis{font-size:12px;color:var(--g700);line-height:1.65;padding:10px 12px;background:var(--g50);border-radius:8px;margin-bottom:8px}
    .ab-analysis-lbl{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:4px;letter-spacing:.3px}

    .result-card{background:#fff;border-radius:14px;margin-bottom:12px;border:1px solid var(--g200);overflow:hidden}
    .rc-bar{height:3px}
    .rc-body{padding:18px 20px}
    .rc-badges{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
    .rc-poss{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:.3px}
    .rc-type{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.2px;background:var(--navy-lt);color:var(--navy)}
    .rc-region-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--g100);color:var(--g500)}
    .rc-essay-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;background:var(--purple-bg);color:var(--purple)}
    .rc-rank{width:22px;height:22px;background:var(--navy);color:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
    .rc-univ{font-size:18px;font-weight:900;color:var(--g900);letter-spacing:-.5px;margin-bottom:2px}
    .rc-dept-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .rc-category{font-size:11px;font-weight:600;color:var(--g400)}
    .rc-dept{font-size:14px;font-weight:700;color:var(--g700)}
    .rc-program{font-size:12px;color:var(--g400);margin-bottom:12px}
    .rc-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px}
    .rc-table th{background:var(--g50);color:var(--g500);font-weight:600;padding:6px 8px;text-align:center;border:1px solid var(--g100);font-size:11px;letter-spacing:.2px}
    .rc-table td{padding:7px 8px;text-align:center;border:1px solid var(--g100);color:var(--g700);font-weight:600}
    .rc-table td.cut{color:var(--navy);font-weight:800;font-size:13px}
    .rc-meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .rc-meta-item{display:flex;align-items:center;gap:4px}
    .rc-meta-label{font-size:10px;color:var(--g400);font-weight:600;letter-spacing:.3px}
    .rc-meta-val{font-size:12px;color:var(--g700);font-weight:700}
    .rc-suneung{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:10px}
    .rc-suneung.has{background:var(--orange-bg);color:var(--orange)}
    .rc-suneung.none{background:var(--green-bg);color:var(--green)}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react-classic">
const { useState, useCallback, useEffect } = React;

const POSS = {
  '위험': { color:'#B91C1C', bg:'#FEE2E2', bar:'#EF4444' },
  '소신': { color:'#B45309', bg:'#FEF3C7', bar:'#F59E0B' },
  '적정': { color:'#1D4ED8', bg:'#DBEAFE', bar:'#3B82F6' },
  '안정': { color:'#047857', bg:'#D1FAE5', bar:'#10B981' },
};
const TYPE_STYLE = {
  '학생부교과': { bg:'#EEF2F9', color:'#1A2E55' },
  '학생부종합': { bg:'#DBEAFE', color:'#1D4ED8' },
  '논술':       { bg:'#EDE9FE', color:'#6D28D9' },
};
const STEPS = [
  '생기부 텍스트 분석 중',
  '내신 등급 자동 추출 중',
  '전공적합성·활동 분석 중',
  '입결 데이터 조회 중',
  '교과·종합·논술 후보 선별 중',
  '최종 배치 리포트 생성 중',
];

const isFormValid = f => f.name.trim() && f.school.trim() && f.major.trim();

async function extractPdfText(file) {
  try {
    if (!window.pdfjsLib) return '';
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
    let text = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 15); i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text.trim().slice(0, 5000);
  } catch(e) { console.error('PDF 추출 오류:', e); return ''; }
}

function HomeScreen({ onStart }) {
  return (
    <div className="home-wrap">
      <div className="home-top">
        <div className="home-wordmark">Uni<span>Choice</span></div>
        <div className="home-sub">생기부 · 내신 기반 대입 수시 배치 분석</div>
      </div>
      <div className="home-divider" />
      <div className="mode-grid">
        <div className="mode-card mode-card--s" onClick={onStart}>
          <div>
            <div className="mc-label">Susi Analysis</div>

        </div>

        <div className="home-mini">
          <div className="home-mini-ico" style={{ background:'#047857' }}>AI</div>
          <div><div className="home-mini-t">AI 자동 분석</div><div className="home-mini-s">Claude 기반 배치</div></div>
        </div>
      </div>
    </div>

}

function Header({ onHome }) {
  return (
    <header className="hdr">
      <div className="hdr-logo" onClick={onHome}>
        <span className="hdr-badge">PILTOP</span>
        <div>
          <div className="hdr-title">UniChoice</div>
          <div className="hdr-sub">AI 수시 배치 분석</div>
        </div>

      <span className="hdr-year">2027학년도</span>
    </header>
  );
}

function StepProgress({ step }) {
  const labels = ['정보 입력', 'AI 분석', '배치 결과'];
  return (
    <div className="steps-wrap">
      <div className="steps">
        {labels.map((lbl, i) => {
          const n = i + 1;
          const cls = n < step ? 'done' : n === step ? 'active' : 'pending';
          return (
            <React.Fragment key={i}>
              <div className="step">
                <div className={`step-num ${cls}`}>{n < step ? '✓' : n}</div>
                <span className={`step-lbl ${n === step ? 'active' : ''}`}>{lbl}</span>
              </div>
              {i < labels.length - 1 && <div className="step-line" />}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function StudentCard({ form, update, submitted }) {
  return (
    <div className="card">
      <div className="sec-head">
        <div className="sec-icon">01</div>
        <div>
          <div className="sec-title">학생 기본 정보</div>
          <div className="sec-sub">이름 · 학교 · 희망학과 입력</div>
        </div>
      </div>
      <div className="row2" style={{ marginBottom: 14 }}>
        <div className={`field ${submitted && !form.name.trim() ? 'field-err' : ''}`}>
          <div className="field-label">이름 <span className="required">*</span></div>
          <input type="text" placeholder="홍길동" value={form.name}
            onChange={e => update('name', e.target.value)} maxLength={20} />
          {submitted && !form.name.trim() && <div className="err-msg">이름을 입력하세요</div>}
        </div>
        <div className={`field ${submitted && !form.school.trim() ? 'field-err' : ''}`}>
          <div className="field-label">학교명 <span className="required">*</span></div>
          <input type="text" placeholder="○○고등학교" value={form.school}
            onChange={e => update('school', e.target.value)} maxLength={30} />
          {submitted && !form.school.trim() && <div className="err-msg">학교명을 입력하세요</div>}
        </div>
      </div>
      <div className={`field ${submitted && !form.major.trim() ? 'field-err' : ''}`}>
        <div className="field-label">희망 학과 / 계열 <span className="required">*</span>
          <span className="f-hint">복수 입력 가능</span>
        </div>
        <input type="text" placeholder="예: 경영학과, 경제학과 / 컴퓨터공학과"
          value={form.major} onChange={e => update('major', e.target.value)} />
        {submitted && !form.major.trim() && <div className="err-msg">희망 학과를 입력하세요</div>}
      </div>
    </div>
  );
}

function WishesCard({ wishes, setWishes }) {
  const addWish = () => {
    if (wishes.length >= 6) return;
    setWishes([...wishes, { university: '', department: '', program: '' }]);
  };
  const removeWish = i => setWishes(wishes.filter((_, idx) => idx !== i));
  const updateWish = (i, field, val) => {
    const next = [...wishes];
    next[i] = { ...next[i], [field]: val };
    setWishes(next);
  };
  return (
    <div className="card">
      <div className="sec-head">
        <div className="sec-icon">03</div>
        <div>
          <div className="sec-title">희망 대학 입력 <span style={{fontSize:11,color:'var(--g400)',fontWeight:400}}>(선택, 최대 6개)</span></div>
          <div className="sec-sub">희망 대학 입력 시 합격 가능성 분석 추가 제공</div>
        </div>
      </div>
      {wishes.length > 0 && (
        <div style={{marginBottom:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8,marginBottom:6}}>
            {['대학명','학과명','전형명',''].map((h,i) => (
              <div key={i} style={{fontSize:11,color:'var(--g400)',fontWeight:600,paddingLeft:2}}>{h}</div>
            ))}
          </div>
          {wishes.map((w, i) => (
            <div key={i} className="wish-row">
              <input type="text" placeholder="예: 연세대학교" value={w.university}
                onChange={e => updateWish(i, 'university', e.target.value)} />
              <input type="text" placeholder="예: 경영학과" value={w.department}
                onChange={e => updateWish(i, 'department', e.target.value)} />
              <input type="text" placeholder="예: 활동우수형" value={w.program}
                onChange={e => updateWish(i, 'program', e.target.value)} />
              <button className="wish-del" onClick={() => removeWish(i)} type="button">×</button>
            </div>
          ))}
        </div>
      )}
      {wishes.length < 6 && (
        <button className="wish-add" onClick={addWish} type="button">
          + 희망 대학 추가 {wishes.length > 0 ? `(${wishes.length}/6)` : ''}
        </button>
      )}
    </div>
  );
}

function RecordCard({ form, update }) {
  const [tab, setTab] = useState('text');
  const [pdfFile, setPdfFile] = useState(null);
  const [imgFiles, setImgFiles] = useState([]);
  const len = form.record.length;
  const isGood = len >= 500;
  const isWarn = len > 0 && len < 200;
  const REC_TABS = [
    { key: 'text', label: '텍스트 붙여넣기' },
    { key: 'pdf',  label: 'PDF 업로드' },
    { key: 'image',label: '이미지 업로드' },
  ];
  return (
    <div className="card">
      <div className="sec-head">
        <div className="sec-icon">02</div>
        <div>
          <div className="sec-title">생활기록부</div>
          <div className="sec-sub">AI가 내신 · 비교과 자동 추출 및 분석</div>
        </div>
      </div>
      <div className="notice-box">
        <div className="notice-box-icon">
          <svg viewBox="0 0 12 12"><path d="M6 1a5 5 0 100 10A5 5 0 006 1zm0 2.5a.75.75 0 110 1.5.75.75 0 010-1.5zM5.25 6h1.5v3h-1.5V6z"/></svg>
        </div>
        <div className="notice-box-text">
          <strong>나이스 또는 학교 포털에서 생기부 전문 복사</strong> 후 붙여넣으세요.
          내신 등급·비교과 활동을 AI가 자동 분석합니다.
        </div>
      </div>
      <div className="rec-tabs">
        {REC_TABS.map(t =>
          <button key={t.key} className={`rec-tab ${tab === t.key ? 'active' : ''}`}
            onClick={() => setTab(t.key)} type="button">{t.label}</button>)}
      </div>
      {tab === 'text' && (
        <div className="field">
          <textarea placeholder={"[교과학습 발달상황]\n국어: ...\n수학: ...\n\n[세부능력 및 특기사항]\n...\n\n[창의적 체험활동]\n..."}
            value={form.record} onChange={e => update('record', e.target.value)} />
          <div className="char-info">
            {isWarn ? <span className="char-warn">500자 이상 입력 권장</span>
              : isGood ? <span className="char-ok">분석에 충분합니다</span> : <span />}
            <span className={`char-cnt ${isGood ? 'char-ok' : ''}`}>{len.toLocaleString()}자</span>
          </div>
        </div>
      )}
      {tab === 'pdf' && (
        <label className={`upload-zone ${pdfFile ? 'has-file' : ''}`}>
          <input type="file" accept=".pdf" onChange={async e => {
            const f = e.target.files[0]; if (!f) return;
            setPdfFile(f);
            const txt = await extractPdfText(f);
            if (txt && txt.trim().length > 50) update('record', txt);
          }} />
          <div className="upload-title">{pdfFile ? pdfFile.name : 'PDF 파일을 클릭하거나 드래그'}</div>
          <div className="upload-desc">{pdfFile ? `${(pdfFile.size/1024).toFixed(0)} KB · 텍스트 추출 완료` : '나이스에서 출력한 생기부 PDF'}</div>
          <span className="upload-hint">.pdf 파일만 지원</span>
        </label>
      )}
      {tab === 'image' && (
        <label className={`upload-zone ${imgFiles.length ? 'has-file' : ''}`}>
          <input type="file" accept="image/jpeg,image/png" multiple onChange={e => {
            const fs = Array.from(e.target.files);
            if (fs.length) { setImgFiles(fs); update('recordFiles', fs); }
          }} />
          <div className="upload-title">{imgFiles.length ? `${imgFiles.length}개 이미지 선택됨` : '이미지를 클릭하거나 드래그'}</div>
          <div className="upload-desc">{imgFiles.length ? imgFiles.map(f => f.name).join(', ') : '여러 장 선택 가능'}</div>
          <span className="upload-hint">JPG · PNG 지원</span>
        </label>
      )}
    </div>
  );
}

function OptionCard({ form, update }) {
  return (
    <div className="card">
      <div className="sec-head">
        <div className="sec-icon">04</div>
        <div>
          <div className="sec-title">전형 옵션</div>
          <div className="sec-sub">추가 전형 포함 여부 설정</div>
        </div>
      </div>
      <div className={`chk-opt ${form.hasEssay ? 'on' : ''}`} onClick={() => update('hasEssay', !form.hasEssay)}>
        <div className={`chk-box ${form.hasEssay ? 'on' : ''}`}>
          {form.hasEssay && (
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6L5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
        <div className="chk-text">
          <h4>논술전형 포함</h4>
          <p>논술을 준비 중이라면 체크하세요. 결과에 논술전형 카드 1~2개가 포함됩니다.</p>
        </div>
      </div>
    </div>
  );
}

function SubmitBar({ onClick, valid }) {
  return (
    <div className="submit-bar">
      <div className="submit-inner">
        <button className="submit-btn" onClick={onClick} disabled={!valid} type="button">
          {valid ? 'AI 분석 시작하기' : '이름 · 학교 · 학과를 모두 입력해주세요'}
        </button>
        {valid && <div className="submit-hint">분석까지 약 20~30초 소요됩니다</div>}
      </div>
    </div>
  );
}

function AnalyzingScreen() {
  const [cur, setCur] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setCur(c => c < STEPS.length - 1 ? c + 1 : c), 4500);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="analyzing-wrap">
      <div className="analyzing-inner">
        <div className="analyzing-spinner" />
        <h2>AI 분석 중</h2>
        <p>약 20~30초 소요됩니다</p>
        <div className="a-steps">
          {STEPS.map((s, i) => {
            const cls = i < cur ? 'done' : i === cur ? 'active' : 'pending';
            return (
              <div key={i} className="a-step">
                <div className={`a-dot ${cls}`}>{i < cur ? '✓' : i === cur ? '●' : '○'}</div>
                <span className={`a-label ${cls}`}>{s}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function AnalysisBox({ analysis, strategy }) {
  const { majorFit, activityFocus, academicGrowth, overallCompetitiveness } = analysis;
  const cc = { '상':'#047857', '중':'#1D4ED8', '하':'#B91C1C' };
  const cb = { '상':'#D1FAE5', '중':'#DBEAFE', '하':'#FEE2E2' };
  const c = overallCompetitiveness || '중';
  const sg = analysis.subjectGrades || {};
  const gy = analysis.gradesByYear || {};
  return (
    <div className="analysis-box">
      <div className="ab-header">
        <span className="ab-title">생기부 경쟁력 분석</span>
        <span className="comp-badge" style={{ color: cc[c], background: cb[c] }}>종합 {c}</span>
      </div>
      {/* 내신 평균 */}
      <div className="ab-grades">
        {[['전교과', sg['전교과']], ['국영수사과', sg['국영수사과']], ['국영수사', sg['국영수사']], ['국영수', sg['국영수']]].map(([k,v]) => (
          <div key={k} className="ab-grade">
            <div className="ab-grade-lbl">{k}</div>
            <div className="ab-grade-val">{v != null ? v : '-'}</div>
          </div>
        ))}
      </div>
      {/* 학년별 추이 */}
      {Object.values(gy).some(v => v != null) && (
        <div className="ab-year">
          {[['1학년', gy['1학년']], ['2학년', gy['2학년']], ['3학년', gy['3학년']]].map(([k,v]) => (
            <div key={k} className="ab-year-item">
              <div className="ab-year-lbl">{k}</div>
              <div className="ab-year-val">{v != null ? v : '-'}</div>
            </div>
          ))}
        </div>
      )}
      {/* 생기부 지표 */}
      <div className="ab-metrics">
        {[['전공적합성', majorFit], ['활동집중도', activityFocus], ['학업성장성', academicGrowth], ['비교과품질', analysis.extracurricularQuality]].map(([k,v]) => (
          <div key={k} className="ab-metric">
            <div className="ab-metric-lbl">{k}</div>
            <div className="ab-metric-val">{v || '-'}</div>
          </div>
        ))}
      </div>
      {/* 교과/비교과 분석 텍스트 */}
      {analysis.subjectAnalysis && (
        <div className="ab-analysis">
          <div className="ab-analysis-lbl">교과 분석</div>
          {analysis.subjectAnalysis}
        </div>
      )}
      {analysis.extracurricularAnalysis && (
        <div className="ab-analysis">
          <div className="ab-analysis-lbl">비교과 분석</div>
          {analysis.extracurricularAnalysis}
        </div>
      )}
      {strategy && <div style={{ fontSize:11, color:'#6B7280', lineHeight:1.5, paddingTop:10, borderTop:'1px solid #F3F4F6' }}>{strategy}</div>}
    </div>
  );
}

function ResultCard({ card, idx, label }) {
  const p = POSS[card.possibility] || POSS['적정'];
  const ts = TYPE_STYLE[card.admissionType] || { bg:'#F3F4F6', color:'#374151' };
  const fmtCut = v => (v == null || v === '-') ? '-' : v;
  const fmtNum = v => (v == null || v === '-') ? '-' : v;
  return (
    <div className="result-card">
      <div className="rc-bar" style={{ background: p.bar }} />
      <div className="rc-body">
        <div className="rc-badges">
          <div className="rc-rank">{label || idx + 1}</div>
          <div className="rc-poss" style={{ color: p.color, background: p.bg }}>{card.possibility}</div>
          <div className="rc-type" style={{ background: ts.bg, color: ts.color }}>{card.admissionType}</div>
          {card.region && <div className="rc-region-badge">{card.region}</div>}
          {card.essayDate && <div className="rc-essay-badge">논술 {card.essayDate}</div>}
        </div>
        <div className="rc-univ">{card.university}</div>
        <div className="rc-dept-row">
          {card.category && <span className="rc-category">{card.category}</span>}
          {card.category && <span style={{color:'#E5E7EB'}}>·</span>}
          <span className="rc-dept">{card.department}</span>
        </div>
        <div className="rc-program">{card.programName}</div>
        {card.cutlines && card.cutlines.length > 0 && (
          <table className="rc-table">
            <thead>
              <tr><th>학년도</th><th>컷 등급</th><th>경쟁률</th><th>충원</th></tr>
            </thead>
            <tbody>
              {card.cutlines.map((c, i) => (
                <tr key={i}>
                  <td style={{fontWeight:700,color:'#374151'}}>{c.year}</td>
                  <td className={c.cut != null ? 'cut' : ''}>{fmtCut(c.cut)}</td>
                  <td>{fmtNum(c.rate) !== '-' ? `${c.rate}:1` : '-'}</td>
                  <td>{fmtNum(c.waitlist)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
        <div className="rc-meta-row">
          {card.recruitCount != null && (
            <div className="rc-meta-item">
              <span className="rc-meta-label">모집인원</span>
              <span className="rc-meta-val">{card.recruitCount}명</span>
            </div>
          )}
          {card.recruitChange && card.recruitChange !== '-' && (
            <div className="rc-meta-item">
              <span className="rc-meta-label">전년대비</span>
              <span className="rc-meta-val" style={{color: card.recruitChange.startsWith('▲') ? '#047857' : '#B91C1C'}}>
                {card.recruitChange}
              </span>
            </div>
          )}
        </div>
        {card.suneungMin && (
          <div className={`rc-suneung ${card.suneungMin === '없음' ? 'none' : 'has'}`}>
            수능최저 {card.suneungMin}
          </div>
        )}
        {card.admissionMethod && (
          <div className="rc-method">전형방법 · {card.admissionMethod}</div>
        )}
        {card.aiReport && (
          <div className="rc-report">{card.aiReport}</div>
        )}
      </div>
    </div>
  );
}

async function exportToWord(result, form) {
  try {
    const D = window.docx;
    if (!D) { alert('docx 라이브러리 로드 실패'); return; }
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
            HeadingLevel, AlignmentType, WidthType, BorderStyle } = D;
    const br = () => new Paragraph({ text: '' });
    const tx = (text, opts={}) => new Paragraph({ children: [new TextRun({ text: String(text||''), ...opts })] });
    const h1 = text => new Paragraph({ text, heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER });
    const h2 = text => new Paragraph({ text, heading: HeadingLevel.HEADING_2 });
    const noBorder = { top:{style:BorderStyle.SINGLE,size:1,color:'D1D5DB'}, bottom:{style:BorderStyle.SINGLE,size:1,color:'D1D5DB'}, left:{style:BorderStyle.SINGLE,size:1,color:'D1D5DB'}, right:{style:BorderStyle.SINGLE,size:1,color:'D1D5DB'} };
    const cell = (text, bold=false, shade=false) => new TableCell({
      children: [new Paragraph({ children: [new TextRun({ text: String(text??'-'), bold, size:18 })] })],
      shading: shade ? { fill:'F3F4F6' } : undefined, borders: noBorder,
    });
    const children = [
      h1('필탑 UniChoice 수시 배치 분석 리포트'),
      tx(`분석일: ${new Date().toLocaleDateString('ko-KR')}  |  2027학년도`, { size:18, color:'6B7280' }),
      br(), h2('학생 정보'),
      tx(`이름: ${form.name}  |  학교: ${form.school}  |  희망학과: ${form.major}`, { size:20 }),
      br(),
    ];
    if (result.student?.analysis) {
      const a = result.student.analysis;
      const sg = a.subjectGrades || {};
      children.push(
        h2('내신 분석'),
        tx(`전교과: ${sg['전교과']??'-'}  |  국영수사과: ${sg['국영수사과']??'-'}  |  국영수사: ${sg['국영수사']??'-'}  |  국영수: ${sg['국영수']??'-'}`, { size:20 }),
        tx(`전공적합성: ${a.majorFit||'-'}  |  활동집중도: ${a.activityFocus||'-'}  |  학업성장성: ${a.academicGrowth||'-'}  |  종합경쟁력: ${a.overallCompetitiveness||'-'}`, { size:20 }),
      );
      if (a.subjectAnalysis) children.push(tx(`교과 분석: ${a.subjectAnalysis}`, { size:18 }));
      if (a.extracurricularAnalysis) children.push(tx(`비교과 분석: ${a.extracurricularAnalysis}`, { size:18 }));
      if (result.student.strategy) children.push(tx(`배치 전략: ${result.student.strategy}`, { size:18, color:'374151' }));
      children.push(br());
    }
    const addCards = (cards, title) => {
      if (!cards || !cards.length) return;
      children.push(h2(title));
      cards.forEach((card, i) => {
        children.push(br());
        children.push(new Paragraph({ children: [new TextRun({ text:`${i+1}. ${card.university} · ${card.department}`, bold:true, size:24 })] }));
        children.push(tx(`${card.admissionType}  |  ${card.programName||'-'}  |  합격가능성: ${card.possibility}  |  ${card.region||'-'}`, { size:18, color:'374151' }));
        if (card.cutlines?.length) {
          const hdrRow = new TableRow({ children: [cell('학년도',true,true),cell('컷 등급',true,true),cell('경쟁률',true,true),cell('충원',true,true)] });
          const dataRows = card.cutlines.map(c => new TableRow({ children: [cell(c.year),cell(c.cut??'-'),cell(c.rate?`${c.rate}:1`:'-'),cell(c.waitlist??'-')] }));
          children.push(new Table({ width:{size:100,type:WidthType.PERCENTAGE}, rows:[hdrRow,...dataRows] }));
        }
        children.push(tx(`모집인원: ${card.recruitCount??'-'}명  |  수능최저: ${card.suneungMin||'-'}`, { size:18 }));
        if (card.admissionMethod) children.push(tx(`전형방법: ${card.admissionMethod}`, { size:18 }));
        if (card.aiReport) children.push(tx(card.aiReport, { size:18, color:'374151' }));
      });
    };
    addCards(result.wishCards, '희망대학 레포트');
    addCards(result.cards, 'AI 추천대학 레포트');
    const doc = new Document({ sections:[{ properties:{}, children }] });
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `UniChoice_${form.name}_${new Date().toISOString().slice(0,10)}.docx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(err) { alert('Word 출력 오류: ' + err.message); }
}

function ResultScreen({ result, form, onHome }) {
  const [exporting, setExporting] = useState(false);
  const handleExport = async () => {
    setExporting(true);
    try { await exportToWord(result, form); } catch(e) { alert('Word 출력 오류: ' + e.message); }
    setExporting(false);
  };
  const wishCards = result.wishCards || [];
  const recCards = result.cards || [];
  return (
    <>
      <Header onHome={onHome} />
      <StepProgress step={3} />
      <main className="main" style={{ paddingBottom: 40 }}>
        {result.student?.analysis && (
          <AnalysisBox analysis={result.student.analysis} strategy={result.student.strategy} />
        )}
        <div className="result-hd">
          <h2>배치 결과</h2>
          <button className="export-btn" onClick={handleExport} disabled={exporting}>
            {exporting ? '출력 중...' : 'Word 출력'}
          </button>
        </div>
        <div className="result-strategy">{result.student?.strategy || ''}</div>
        {wishCards.length > 0 && (
          <>
            <div className="result-section-title">희망대학 레포트 ({wishCards.length}개)</div>
            {wishCards.map((card, i) => <ResultCard key={i} card={card} idx={i} label={`희망${i+1}`} />)}
          </>
        )}
        {recCards.length > 0 && (
          <>
            <div className="result-section-title">AI 추천대학 ({recCards.length}개)</div>
            {recCards.map((card, i) => <ResultCard key={i} card={card} idx={i} />)}
          </>
        )}
      </main>
    </>
  );
}

function App() {
  const [screen, setScreen] = useState('home');
  const [form, setForm] = useState({
    name:'', school:'', major:'', record:'',
    recordFile: null, recordFiles: [], hasEssay: false,
  });
  const [wishes, setWishes] = useState([]);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const update = useCallback((k, v) => setForm(p => ({ ...p, [k]: v })), []);

  const handleAnalyze = async () => {
    setSubmitted(true);
    if (!isFormValid(form)) return;
    setScreen('analyzing'); setError(null);
    try {
      const validWishes = wishes.filter(w => w.university.trim());
      const payload = {
        name: form.name, school: form.school, major: form.major,
        record: (form.record || '').slice(0, 5000),
        hasEssay: form.hasEssay,
        wishes: validWishes.length > 0 ? validWishes : undefined,
      };
      const res = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const t = await res.text().catch(() => '');
        throw new Error(t || `서버 오류 ${res.status}`);
      }
      const data = await res.json();
      setResult(data); setScreen('result');
    } catch(err) {
      setError(err.message); setScreen('form');
    }
  };

  if (screen === 'home') return <HomeScreen onStart={() => setScreen('form')} />;
  if (screen === 'analyzing') return <AnalyzingScreen />;
  if (screen === 'result') return <ResultScreen result={result} form={form} onHome={() => setScreen('home')} />;

  return (
    <>
      <Header onHome={() => setScreen('home')} />
      <StepProgress step={1} />
      <main className="main">
        {error && <div className="error-box">{error}</div>}
        <div className="intro">
          <h2>수시 배치 분석을 시작합니다</h2>
          <p>생기부를 입력하면 AI가 내신 등급과 비교과 활동을 자동 분석하여<br />실제 입결 데이터 기반 최적 배치 카드를 생성합니다.</p>
          <div className="intro-steps">
            {[['01','정보 입력','생기부 업로드'], ['02','AI 분석','20~30초'], ['03','배치 결과','카드 6~7장']].map(([ic, t, s], i, arr) => (
              <React.Fragment key={i}>
                <div className="intro-step">
                  <div className="intro-step-icon">{ic}</div>
                  <div className="intro-step-text"><strong>{t}</strong>{s}</div>
                </div>
                {i < arr.length - 1 && <span className="intro-arrow">›</span>}
              </React.Fragment>
            ))}
          </div>
        </div>
        <StudentCard form={form} update={update} submitted={submitted} />
        <RecordCard form={form} update={update} />
        <WishesCard wishes={wishes} setWishes={setWishes} />
        <OptionCard form={form} update={update} />
      </main>
      <SubmitBar onClick={handleAnalyze} valid={isFormValid(form)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniChoice | 필탑</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
  <style>
    [id*="accessibility"],[class*="accessibility"],[id*="userway"],[class*="userway"],
    [id*="ada"],[class*="ada"],[class*="a11y"]{display:none!important;visibility:hidden!important}

    :root {
      --navy:#1A2E55; --navy-mid:#2D4A80; --navy-lt:#EEF2F9;
      --blue:#4A90D9; --blue-lt:#EBF3FC;
      --green:#059669; --green-bg:#D1FAE5;
      --orange:#D97706; --orange-bg:#FEF3C7;
      --red:#DC2626; --red-bg:#FEE2E2;
      --blue2:#2563EB; --blue2-bg:#DBEAFE;
      --g50:#F9FAFB; --g100:#F3F4F6; --g200:#E5E7EB;
      --g300:#D1D5DB; --g400:#9CA3AF; --g500:#6B7280;
      --g700:#374151; --g900:#111827;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F7F7F5;color:var(--g900);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* ══ HOME ══ */
    .home-wrap{max-width:520px;margin:0 auto;padding:48px 18px 60px}
    .home-top{text-align:center;margin-bottom:28px}
    .home-logo-row{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px}
    .home-logo-icon{width:38px;height:38px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .home-logo-name{font-size:24px;font-weight:800;color:var(--g900);letter-spacing:-.8px}
    .home-logo-sub{font-size:13px;color:var(--g400)}
    .home-divider{height:1px;background:var(--g200);margin-bottom:24px}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .mode-card{border-radius:18px;padding:24px 20px 20px;min-height:340px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .mode-card--s{background:var(--navy)}
    .mode-card--j{background:#fff;border:1px solid var(--g200)}
    .mc-eyebrow{display:flex;align-items:center;gap:6px;margin-bottom:20px}
    .mc-dot{width:7px;height:7px;border-radius:50%}
    .mc-dot--active{background:#4CAF82}
    .mc-dot--inactive{background:var(--g300)}
    .mc-eyebrow-txt{font-size:11px;font-weight:600}
    .mode-card--s .mc-eyebrow-txt{color:rgba(255,255,255,.6)}
    .mode-card--j .mc-eyebrow-txt{color:var(--g400)}
    .mc-title{font-size:32px;font-weight:700;line-height:1.1;letter-spacing:-1.5px;margin-bottom:10px}
    .mode-card--s .mc-title{color:#fff}
    .mode-card--j .mc-title{color:var(--g900)}
    .mc-desc{font-size:12px;line-height:1.6;margin-bottom:18px}
    .mode-card--s .mc-desc{color:rgba(255,255,255,.55)}
    .mode-card--j .mc-desc{color:var(--g400)}
    .mc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
    .mc-tag{font-size:10px;font-weight:600;padding:4px 9px;border-radius:8px}
    .mode-card--s .mc-tag{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
    .mode-card--j .mc-tag{background:var(--g100);color:var(--g400)}
    .mc-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s}
    .mc-btn:hover{opacity:.88}
    .mc-btn--start{background:rgba(255,255,255,.13);color:rgba(255,255,255,.9)}
    .mc-btn--soon{background:var(--g100);color:var(--g400);cursor:default;justify-content:center}
    .mc-num{position:absolute;bottom:-10px;right:8px;font-size:80px;font-weight:700;line-height:1;letter-spacing:-4px;pointer-events:none}
    .mode-card--s .mc-num{color:rgba(255,255,255,.04)}
    .mode-card--j .mc-num{color:rgba(0,0,0,.04)}
    .home-minis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .home-mini{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
    .home-mini:hover{border-color:var(--g300)}
    .home-mini-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .home-mini-t{font-size:12px;font-weight:600;color:var(--g900);margin-bottom:2px}
    .home-mini-s{font-size:10px;color:var(--g400)}

    /* ══ HEADER ══ */
    .hdr{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    .hdr-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .hdr-badge{background:var(--blue);color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:7px}
    .hdr-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px}
    .hdr-sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:1px}
    .hdr-year{color:rgba(255,255,255,.4);font-size:12px}

    /* ══ STEPS ══ */
    .steps-wrap{background:#fff;border-bottom:1px solid var(--g200);padding:14px 20px}
    .steps{max-width:620px;margin:0 auto;display:flex;align-items:center}
    .step{display:flex;align-items:center;gap:8px}
    .step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .step-num.active{background:var(--navy);color:#fff}
    .step-num.done{background:var(--green);color:#fff}
    .step-num.pending{background:var(--g200);color:var(--g500)}
    .step-lbl{font-size:12px;color:var(--g500);white-space:nowrap}
    .step-lbl.active{color:var(--navy);font-weight:700}
    .step-line{flex:1;height:2px;background:var(--g200);margin:0 8px}

    /* ══ FORM ══ */
    .main{max-width:640px;margin:0 auto;padding:20px 14px 110px}
    .error-box{background:var(--red-bg);border:1px solid #FECACA;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:14px}
    .intro{background:linear-gradient(135deg,var(--navy) 0%,#2D4A80 100%);border-radius:16px;padding:22px 22px 20px;margin-bottom:16px;color:#fff}
    .intro h2{font-size:17px;font-weight:800;margin-bottom:6px}
    .intro p{font-size:12px;color:rgba(255,255,255,.72);line-height:1.6;margin-bottom:16px}
    .intro-steps{display:flex}
    .intro-step{flex:1;display:flex;align-items:center;gap:6px}
    .intro-step-icon{width:30px;height:30px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .intro-step-text{font-size:11px;color:rgba(255,255,255,.75);line-height:1.4}
    .intro-step-text strong{display:block;color:#fff;font-size:12px}
    .intro-arrow{color:rgba(255,255,255,.3);font-size:12px;margin:0 6px}
    .card{background:#fff;border-radius:16px;padding:22px 20px;margin-bottom:14px;border:1px solid var(--g100);box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--g100)}
    .sec-icon{width:34px;height:34px;background:var(--navy-lt);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .sec-title{font-size:15px;font-weight:800;color:var(--navy)}
    .sec-sub{font-size:11px;color:var(--g500);margin-top:2px}
    .field{margin-bottom:14px}
    .field:last-child{margin-bottom:0}
    .field-label{display:flex;align-items:center;gap:4px;margin-bottom:7px;font-size:13px;font-weight:700;color:var(--g700)}
    .required{color:var(--red)}
    .f-hint{font-weight:400;font-size:11px;color:var(--g400)}
    input[type="text"]{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:14px;color:var(--g900);background:#fff;outline:none;transition:border-color .18s;font-family:inherit}
    input[type="text"]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,144,217,.13)}
    input::placeholder{color:var(--g300)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    textarea{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .18s;font-family:inherit;resize:vertical;min-height:200px;line-height:1.65}
    textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,144,217,.13)}
    textarea::placeholder{color:var(--g300)}
    .char-info{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .char-warn{font-size:11px;color:var(--orange)}
    .char-cnt{font-size:11px;color:var(--g400)}
    .char-ok{font-size:11px;color:var(--green);font-weight:600}
    .ai-box{background:linear-gradient(135deg,#EEF2F9 0%,#E8F0FD 100%);border:1px solid rgba(26,46,85,.1);border-radius:12px;padding:14px 16px;display:flex;gap:13px;align-items:center;margin-bottom:14px}
    .ai-box-icon{width:40px;height:40px;background:var(--navy);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
    .ai-box-text h4{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px}
    .ai-box-text p{font-size:11px;color:var(--g500);line-height:1.5}
    .rec-tabs{display:flex;gap:4px;background:var(--g100);border-radius:10px;padding:4px;margin-bottom:16px}
    .rec-tab{flex:1;padding:8px 6px;border:none;border-radius:7px;background:transparent;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .rec-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .upload-zone{border:2px dashed var(--g200);border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:border-color .18s,background .18s;position:relative;display:block;width:100%}
    .upload-zone:hover{border-color:var(--blue);background:var(--blue-lt)}
    .upload-zone.has-file{border-color:var(--navy);background:var(--navy-lt);border-style:solid}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:32px;margin-bottom:10px;display:block}
    .upload-title{font-size:14px;font-weight:700;color:var(--g700);margin-bottom:5px}
    .upload-zone.has-file .upload-title{color:var(--navy)}
    .upload-desc{font-size:12px;color:var(--g400);line-height:1.5}
    .upload-zone.has-file .upload-desc{color:var(--navy-mid)}
    .upload-hint{margin-top:12px;display:inline-block;background:var(--g100);border-radius:6px;padding:4px 12px;font-size:11px;color:var(--g500)}
    .upload-zone.has-file .upload-hint{background:rgba(26,46,85,.1);color:var(--navy)}
    .chk-opt{display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid var(--g200);border-radius:12px;cursor:pointer;transition:all .15s;user-select:none}
    .chk-opt:hover{border-color:var(--blue);background:var(--blue-lt)}
    .chk-opt.on{border-color:var(--navy);background:var(--navy-lt)}
    .chk-box{width:22px;height:22px;border-radius:7px;border:2px solid var(--g300);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .chk-box.on{background:var(--navy);border-color:var(--navy)}
    .chk-text h4{font-size:14px;font-weight:700;color:var(--g900)}
    .chk-text p{font-size:12px;color:var(--g500);margin-top:3px;line-height:1.4}
    .submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px 16px;border-top:1px solid var(--g200);box-shadow:0 -4px 20px rgba(0,0,0,.09);z-index:200}
    .submit-inner{max-width:608px;margin:0 auto}
    .submit-btn{display:block;width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:background .18s;font-family:inherit}
    .submit-btn:hover:not(:disabled){background:var(--navy-mid)}
    .submit-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .submit-hint{text-align:center;font-size:11px;color:var(--g400);margin-top:6px}
    .field-err input,.field-err textarea{border-color:var(--red)!important}
    .err-msg{font-size:11px;color:var(--red);margin-top:4px}
    .analyzing-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff}
    .analyzing-inner{max-width:420px;padding:40px 24px;text-align:center;width:100%}
    .analyzing-robot{font-size:56px;display:block;margin-bottom:24px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .analyzing-inner h2{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:8px}
    .analyzing-inner>p{font-size:13px;color:var(--g400);margin-bottom:32px}
    .a-steps{text-align:left}
    .a-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100)}
    .a-step:last-child{border-bottom:none}
    .a-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .a-dot.done{background:var(--green-bg);color:var(--green)}
    .a-dot.active{background:var(--navy);color:#fff;animation:blink .8s infinite}
    .a-dot.pending{background:var(--g100);color:var(--g300)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
    .a-label{font-size:13px;font-weight:600}
    .a-label.done{color:var(--green)}.a-label.active{color:var(--navy)}.a-label.pending{color:var(--g300)}
    .result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .result-top h2{font-size:17px;font-weight:800;color:var(--navy)}
    .export-btn{padding:9px 16px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .export-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .analysis-box{background:linear-gradient(135deg,var(--navy-lt) 0%,#E8F0FD 100%);border:1px solid rgba(26,46,85,.1);border-radius:16px;padding:18px 20px;margin-bottom:14px}
    .ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .ab-title{font-size:14px;font-weight:800;color:var(--navy)}
    .comp-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
    .ab-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .ab-metric{background:#fff;border-radius:10px;padding:10px 12px;text-align:center}
    .ab-metric-lbl{font-size:10px;color:var(--g400);margin-bottom:4px}
    .ab-metric-val{font-size:14px;font-weight:800;color:var(--navy)}
    .result-card{background:#fff;border-radius:16px;margin-bottom:12px;border:1px solid var(--g200);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .rc-bar{height:4px}
    .rc-body{padding:18px 20px}
    .rc-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .rc-rank{width:24px;height:24px;background:var(--navy);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
    .rc-poss{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
    .rc-type{font-size:11px;font-weight:700;margin-left:auto}
    .rc-univ{font-size:17px;font-weight:900;color:var(--g900);letter-spacing:-.3px;margin-bottom:2px}
    .rc-dept{font-size:13px;color:var(--g500);margin-bottom:12px}
    .rc-converted{display:inline-block;background:var(--navy-lt);color:var(--navy);font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:12px}
    .rc-cuts{display:flex;gap:6px;margin-bottom:10px}
    .rc-cut{background:var(--g50);border-radius:8px;padding:6px 10px;text-align:center;flex:1}
    .rc-cut-yr{font-size:9px;color:var(--g400);display:block;margin-bottom:2px}
    .rc-cut-val{font-size:13px;font-weight:800;color:var(--navy);display:block}
    .rc-meta{display:flex;gap:14px;margin-bottom:10px}
    .rc-meta span{font-size:12px;color:var(--g500)}
    .rc-meta strong{color:var(--g900);font-weight:700}
    .rc-suneung{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:10px}
    .rc-suneung.has{background:var(--orange-bg);color:var(--orange)}
    .rc-suneung.none{background:var(--green-bg);color:var(--green)}
    .rc-report{font-size:12px;color:var(--g500);line-height:1.65;padding-top:10px;border-top:1px solid var(--g100)}
    @media(max-width:500px){
      .mode-grid{grid-template-columns:1fr}
      .row2{grid-template-columns:1fr}
      .ab-metrics{grid-template-columns:1fr 1fr}
      .intro-arrow{display:none}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const POSS={'위험':{color:'#DC2626',bg:'#FEE2E2',bar:'#DC2626'},'소신':{color:'#D97706',bg:'#FEF3C7',bar:'#D97706'},'적정':{color:'#2563EB',bg:'#DBEAFE',bar:'#2563EB'},'안정':{color:'#059669',bg:'#D1FAE5',bar:'#059669'}};
const TYPE_CLR={'학생부교과':'#1A2E55','학생부종합':'#2563EB','논술':'#7C3AED'};
const STEPS=['생기부 텍스트 분석 중','내신 등급 자동 추출 중','전공적합성·활동 분석 중','입결 데이터 조회 중','교과·종합·논술 후보 선별 중','최종 배치 리포트 생성 중'];
const isFormValid=f=>f.name.trim()&&f.school.trim()&&f.major.trim();
async function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);})}

/* ── HomeScreen ── */
function HomeScreen({onStart}){
  return(
    <div className="home-wrap">
      <div className="home-top">
        <div className="home-logo-row">
          <div className="home-logo-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="11" width="5" height="7" rx="1" fill="white"/><rect x="7.5" y="7" width="5" height="11" rx="1" fill="white"/><rect x="13" y="3" width="5" height="15" rx="1" fill="white"/></svg></div>
          <span className="home-logo-name">UniChoice</span>
        </div>
        <div className="home-logo-sub">생기부 · 모의고사 기반 대입 배치분석</div>
      </div>
      <div className="home-divider"/>
      <div className="mode-grid">
        <div className="mode-card mode-card--s" style={{cursor:'pointer'}} onClick={onStart}>
          <div>
            <div className="mc-eyebrow"><span className="mc-dot mc-dot--active"/><span className="mc-eyebrow-txt">수시 배치분석</span></div>
            <div className="mc-title">수시<br/>배치</div>
            <div className="mc-desc">생기부 분석부터<br/>전형별 카드 생성까지</div>
            <div className="mc-tags">
              {['학생부종합','학생부교과','논술','카드 10개'].map(t=><span key={t} className="mc-tag">{t}</span>)}
            </div>
          </div>
          <div className="mc-btn mc-btn--start"><span>배치 시작하기</span><span>→</span></div>
          <div className="mc-num">01</div>
        </div>
        <div className="mode-card mode-card--j">
          <div>

/* ── StepProgress ── */
function StepProgress({step}){
  const labels=['정보 입력','AI 분석','배치 결과'];
  return(
    <div className="steps-wrap"><div className="steps">
      {labels.map((lbl,i)=>{
        const n=i+1,cls=n<step?'done':n===step?'active':'pending';
        return(<React.Fragment key={i}>
          <div className="step"><div className={`step-num ${cls}`}>{n<step?'✓':n}</div><span className={`step-lbl ${n===step?'active':''}`}>{lbl}</span></div>
          {i<labels.length-1&&<div className="step-line"/>}
        </React.Fragment>);
      })}
    </div></div>
  );
}

function SecHead({icon,title,sub}){

        <div className="ai-box"><div className="ai-box-icon">🤖</div><div className="ai-box-text"><h4>AI 자동 추출</h4><p>나이스·학교 포털에서 생기부 전문을 복사해 붙여넣으세요.<br/>내신 등급·전공적합성·학업성장성을 AI가 자동 분석합니다.</p></div></div>
        <div className="field">
          <textarea placeholder={"[세부능력 및 특기사항]\n\n국어: ...\n수학: ...\n\n[창의적 체험활동]\n자율활동: ...\n동아리: ...\n\n[행동특성 및 종합의견]\n..."} value={form.record} onChange={e=>update('record',e.target.value)}/>
          <div className="char-info">
            {isWarn?<span className="char-warn">⚠ 500자 이상 입력 권장</span>:isGood?<span className="char-ok">✓ 분석에 충분합니다</span>:<span/>}
            <span className={`char-cnt ${isGood?'char-ok':''}`}>{len.toLocaleString()}자</span>
          </div>
        </div>
      </>}
      {tab==='pdf'&&<>
        <div className="ai-box"><div className="ai-box-icon">🤖</div><div className="ai-box-text"><h4>PDF 자동 분석</h4><p>나이스에서 내보낸 생기부 PDF를 업로드하면<br/>AI가 텍스트를 추출해 자동 분석합니다.</p></div></div>
        <label className={`upload-zone ${pdfFile?'has-file':''}`}>
          <input type="file" accept=".pdf" onChange={e=>{const f=e.target.files[0];if(f){if(f.size>4*1024*1024){alert("PDF 파일이 너무 큽니다 (최대 4MB).

해결 방법:
① 생기부를 텍스트로 붙여넣기 탭 사용
② PDF를 압축 후 재시도");e.target.value="";return;}setPdfFile(f);update("recordFile",f);}}}/>
          <span className="upload-icon">{pdfFile?'✅':'📄'}</span>
          <div className="upload-title">{pdfFile?pdfFile.name:'PDF 파일을 클릭하거나 드래그'}</div>
          <div className="upload-desc">{pdfFile?`${(pdfFile.size/1024).toFixed(0)} KB · 업로드 완료`:'나이스에서 출력한 생기부 PDF'}</div>
          <span className="upload-hint">.pdf 파일만 지원</span>

      {tab==='image'&&<>
        <div className="ai-box"><div className="ai-box-icon">🤖</div><div className="ai-box-text"><h4>이미지 OCR 분석</h4><p>생기부를 촬영하거나 스캔한 이미지를 업로드하세요.<br/>AI OCR로 텍스트를 추출해 자동 분석합니다.</p></div></div>
        <label className={`upload-zone ${imgFiles.length?'has-file':''}`}>

          <div className="upload-title">{imgFiles.length?`${imgFiles.length}개 이미지 선택됨`:'이미지를 클릭하거나 드래그'}</div>

          <div key={i} className="a-step"><div className={`a-dot ${cls}`}>{i<cur?'✓':i===cur?'●':'○'}</div><span className={`a-label ${cls}`}>{s}</span></div>

    <div className="analysis-box">
      <div className="ab-header"><span className="ab-title">🤖 생기부 경쟁력 분석</span><span className="comp-badge" style={{color:cc[c],background:cb[c]}}>종합 {c}</span></div>

async function exportToWord(result,form){
  const D=window.docx;
  if(!D){alert('docx 라이브러리 로드 실패');return;}
  const {Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType}=D;
  const br=()=>new Paragraph({text:''});
  const tx=(text,bold=false)=>new Paragraph({children:[new TextRun({text:String(text||''),bold,size:bold?26:22})]});
  const h1=(text)=>new Paragraph({text,heading:HeadingLevel.HEADING_1,alignment:AlignmentType.CENTER});
  const h2=(text)=>new Paragraph({text,heading:HeadingLevel.HEADING_2});
  const children=[h1('필탑 UniChoice 수시 배치 분석 리포트'),tx(`분석일: ${new Date().toLocaleDateString('ko-KR')}`),br(),h2('학생 정보'),tx(`이름: ${form.name}`),tx(`학교: ${form.school}`),tx(`희망학과: ${form.major}`),br()];
  if(result.student?.analysis){const a=result.student.analysis;children.push(h2('생기부 경쟁력 분석'),tx(`전공적합성: ${a.majorFit||'-'}`),tx(`활동집중도: ${a.activityFocus||'-'}`),tx(`학업성장성: ${a.academicGrowth||'-'}`),tx(`종합경쟁력: ${a.overallCompetitiveness||'-'}`),br());}
  children.push(h2('배치 후보 10개'));
  (result.cards||[]).forEach((card,i)=>{
    const cut=(card.cutlines||[]).map(c=>`${c.year}학년도 ${c.value}등급`).join(' / ');
    children.push(br(),tx(`${i+1}. ${card.university} ${card.department}`,true),tx(`전형: ${card.admissionType} | 합격가능성: ${card.possibility}`),card.convertedScore!=null?tx(`환산점수: ${Number(card.convertedScore).toFixed(2)}점`):br(),cut?tx(`입결 추이: ${cut}`):br(),tx(`경쟁률: ${card.competitionRate||'-'}:1 | 충원율: ${card.refundRate!=null?card.refundRate+'%':'-'}`),tx(`수능최저: ${card.suneungMin||'없음'}`),tx(`AI 리포트: ${card.aiReport||''}`));
  });
  const doc=new Document({sections:[{properties:{},children}]});
  const blob=await Packer.toBlob(doc);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`UniChoice_${form.name}_${new Date().toISOString().slice(0,10)}.docx`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function ResultScreen({result,form,onHome}){
  const [exporting,setExporting]=useState(false);
  const handleExport=async()=>{setExporting(true);try{await exportToWord(result,form);}catch(e){alert('Word 출력 오류: '+e.message);}setExporting(false);};
  return(<>
    <Header onHome={onHome}/>
    <StepProgress step={3}/>
    <main className="main" style={{paddingBottom:40}}>
      {result.student?.analysis&&<AnalysisBox analysis={result.student.analysis}/>}
      <div className="result-top"><h2>배치 후보 {(result.cards||[]).length}개</h2><button className="export-btn" onClick={handleExport} disabled={exporting}>{exporting?'출력 중...':'📄 Word 출력'}</button></div>
      {(result.cards||[]).map((card,i)=><ResultCard key={i} card={card} idx={i}/>)}
    </main>
  </>);
}

function App(){
  const [screen,setScreen]=useState('home');
  const [form,setForm]=useState({name:'',school:'',major:'',record:'',recordFile:null,recordFiles:[],hasEssay:false});
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [submitted,setSubmitted]=useState(false);
  const update=useCallback((k,v)=>setForm(p=>({...p,[k]:v})),[]);

  const handleAnalyze=async()=>{
    setSubmitted(true);
    if(!isFormValid(form))return;
    setScreen('analyzing');setError(null);
    try{
      const payload={name:form.name,school:form.school,major:form.major,record:(form.record||"").slice(0,4000),hasEssay:form.hasEssay};
      if(form.recordFile){payload.recordFileBase64=await toB64(form.recordFile);payload.recordFileName=form.recordFile.name;}
      if(form.recordFiles.length){payload.recordFilesBase64=await Promise.all(form.recordFiles.map(f=>toB64(f)));payload.recordFileNames=form.recordFiles.map(f=>f.name);}
      const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(t||`서버 오류 ${res.status}`);}
      const data=await res.json();
      setResult(data);setScreen('result');
    }catch(err){setError(err.message);setScreen('form');}
  };

  if(screen==='home') return <HomeScreen onStart={()=>setScreen('form')}/>;
  if(screen==='analyzing') return <AnalyzingScreen/>;
  if(screen==='result') return <ResultScreen result={result} form={form} onHome={()=>setScreen('home')}/>;

  return(<>
    <Header onHome={()=>setScreen('home')}/>
    <StepProgress step={1}/>
    <main className="main">
      {error&&<div className="error-box">⚠ {error}</div>}
      <div className="intro">
        <h2>수시 배치 분석을 시작합니다</h2>
        <p>생기부를 업로드하면 AI가 내신 등급·활동을 자동 추출하여<br/>실제 입결 데이터와 비교 후 최적 배치 후보 10개를 추천합니다.</p>
        <div className="intro-steps">
          {[['✏️','정보 입력','생기부 업로드'],['🤖','AI 분석','20~30초'],['📊','배치 결과','카드 10개']].map(([ic,t,s],i,arr)=>(
            <React.Fragment key={i}>
              <div className="intro-step"><div className="intro-step-icon">{ic}</div><div className="intro-step-text"><strong>{t}</strong>{s}</div></div>
              {i<arr.length-1&&<span className="intro-arrow">›</span>}
            </React.Fragment>
          ))}
        </div>
      </div>
      <StudentCard form={form} update={update} submitted={submitted}/>
      <RecordCard form={form} update={update}/>
      <OptionCard form={form} update={update}/>
    </main>
    <SubmitBar onClick={handleAnalyze} valid={isFormValid(form)}/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

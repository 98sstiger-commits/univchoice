<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniChoice | 필탑</title>
  <script>window.process = { env: { NODE_ENV: 'production' } };</script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    [id*="accessibility"],[class*="accessibility"],[id*="userway"],[class*="userway"],
    [id*="ada"],[class*="ada"],[class*="a11y"]{display:none!important;visibility:hidden!important}

    :root {
      --navy:#1A2E55;
      --navy-mid:#2D4A80;
      --navy-lt:#EEF2F9;
      --blue:#4A90D9;
      --blue-lt:#EBF3FC;
      --green:#047857;
      --green-bg:#D1FAE5;
      --orange:#B45309;
      --orange-bg:#FEF3C7;
      --red:#B91C1C;
      --red-bg:#FEE2E2;
      --purple:#6D28D9;
      --purple-bg:#EDE9FE;
      --g50:#F9FAFB;
      --g100:#F3F4F6;
      --g200:#E5E7EB;
      --g300:#D1D5DB;
      --g400:#9CA3AF;
      --g500:#6B7280;
      --g700:#374151;
      --g900:#111827;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F4F5F7;color:var(--g900);min-height:100vh;-webkit-font-smoothing:antialiased}

    .home-wrap{max-width:520px;margin:0 auto;padding:48px 20px 60px}
    .home-top{text-align:center;margin-bottom:32px}
    .home-wordmark{font-size:28px;font-weight:800;color:var(--g900);letter-spacing:-1px;margin-bottom:4px}
    .home-wordmark span{color:var(--navy)}
    .home-sub{font-size:13px;color:var(--g400);letter-spacing:.2px}
    .home-divider{height:1px;background:var(--g200);margin-bottom:28px}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .mode-card{border-radius:16px;padding:26px 22px 22px;min-height:320px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .mode-card--s{background:var(--navy);cursor:pointer}
    .mode-card--j{background:#fff;border:1px solid var(--g200)}
    .mc-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px}
    .mode-card--s .mc-label{color:rgba(255,255,255,.45)}
    .mode-card--j .mc-label{color:var(--g300)}
    .mc-title{font-size:30px;font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:10px}
    .mode-card--s .mc-title{color:#fff}
    .mode-card--j .mc-title{color:var(--g300)}
    .mc-desc{font-size:12px;line-height:1.65;margin-bottom:20px}
    .mode-card--s .mc-desc{color:rgba(255,255,255,.5)}
    .mode-card--j .mc-desc{color:var(--g300)}
    .mc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:24px}
    .mc-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.2px}
    .mode-card--s .mc-tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
    .mode-card--j .mc-tag{background:var(--g100);color:var(--g300)}
    .mc-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s;letter-spacing:.1px}
    .mc-btn:hover{opacity:.85}
    .mc-btn--start{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
    .mc-btn--soon{background:var(--g100);color:var(--g300);cursor:default;justify-content:center}
    .mc-num{position:absolute;bottom:-14px;right:10px;font-size:90px;font-weight:800;line-height:1;letter-spacing:-4px;pointer-events:none}
    .mode-card--s .mc-num{color:rgba(255,255,255,.04)}
    .mode-card--j .mc-num{color:rgba(0,0,0,.04)}
    .home-minis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .home-mini{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px}
    .home-mini-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;color:#fff}
    .home-mini-t{font-size:12px;font-weight:600;color:var(--g700);margin-bottom:2px}
    .home-mini-s{font-size:10px;color:var(--g400)}

    .hdr{background:var(--navy);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
    .hdr-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
    .hdr-badge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.5px}
    .hdr-title{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.5px}
    .hdr-sub{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:.3px;margin-top:1px}
    .hdr-year{color:rgba(255,255,255,.35);font-size:12px;font-weight:600;letter-spacing:.5px}

    .steps-wrap{background:#fff;border-bottom:1px solid var(--g200);padding:13px 22px}
    .steps{max-width:620px;margin:0 auto;display:flex;align-items:center}
    .step{display:flex;align-items:center;gap:8px}
    .step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .step-num.active{background:var(--navy);color:#fff}
    .step-num.done{background:var(--green);color:#fff}
    .step-num.pending{background:var(--g200);color:var(--g400)}
    .step-lbl{font-size:12px;color:var(--g400);white-space:nowrap}
    .step-lbl.active{color:var(--navy);font-weight:700}
    .step-line{flex:1;height:1px;background:var(--g200);margin:0 8px}

    .main{max-width:640px;margin:0 auto;padding:22px 16px 110px}
    .error-box{background:var(--red-bg);border:1px solid #FECACA;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px}
    .intro{background:var(--navy);border-radius:14px;padding:22px 22px 20px;margin-bottom:16px;color:#fff}
    .intro h2{font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
    .intro p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.65;margin-bottom:16px}
    .intro-steps{display:flex;gap:0}
    .intro-step{flex:1;display:flex;align-items:center;gap:8px}
    .intro-step-icon{width:28px;height:28px;background:rgba(255,255,255,.1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;color:rgba(255,255,255,.7)}
    .intro-step-text{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}
    .intro-step-text strong{display:block;color:rgba(255,255,255,.9);font-size:12px;margin-bottom:1px}
    .intro-arrow{color:rgba(255,255,255,.2);font-size:14px;margin:0 4px}
    .card{background:#fff;border-radius:14px;padding:22px 20px;margin-bottom:14px;border:1px solid var(--g100);box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--g100)}
    .sec-icon{width:32px;height:32px;background:var(--navy-lt);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--navy);flex-shrink:0}
    .sec-title{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-.2px}
    .sec-sub{font-size:11px;color:var(--g400);margin-top:2px}
    .field{margin-bottom:14px}
    .field:last-child{margin-bottom:0}
    .field-label{display:flex;align-items:center;gap:4px;margin-bottom:7px;font-size:13px;font-weight:700;color:var(--g700)}
    .required{color:var(--red)}
    .f-hint{font-weight:400;font-size:11px;color:var(--g400)}
    input[type="text"]{width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:14px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit}
    input[type="text"]:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,46,85,.08)}
    input::placeholder{color:var(--g300)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    textarea{width:100%;padding:11px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;resize:vertical;min-height:200px;line-height:1.65}
    textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,46,85,.08)}
    textarea::placeholder{color:var(--g300)}
    .char-info{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .char-warn{font-size:11px;color:var(--orange)}
    .char-cnt{font-size:11px;color:var(--g400)}
    .char-ok{font-size:11px;color:var(--green);font-weight:600}
    .notice-box{background:var(--navy-lt);border:1px solid rgba(26,46,85,.1);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
    .notice-box-icon{width:20px;height:20px;background:var(--navy);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .notice-box-icon svg{width:11px;height:11px;fill:#fff}
    .notice-box-text{font-size:12px;color:var(--navy-mid);line-height:1.6}
    .notice-box-text strong{font-weight:700;color:var(--navy)}
    .rec-tabs{display:flex;gap:4px;background:var(--g100);border-radius:8px;padding:3px;margin-bottom:14px}
    .rec-tab{flex:1;padding:8px 6px;border:none;border-radius:6px;background:transparent;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .rec-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .upload-zone{border:1.5px dashed var(--g300);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .15s;position:relative;display:block;width:100%}
    .upload-zone:hover{border-color:var(--navy);background:var(--navy-lt)}
    .upload-zone.has-file{border-color:var(--navy);background:var(--navy-lt);border-style:solid}
    .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-title{font-size:14px;font-weight:700;color:var(--g700);margin-bottom:5px}
    .upload-zone.has-file .upload-title{color:var(--navy)}
    .upload-desc{font-size:12px;color:var(--g400);line-height:1.5}
    .upload-zone.has-file .upload-desc{color:var(--navy-mid)}
    .upload-hint{margin-top:10px;display:inline-block;background:var(--g100);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--g400)}
    .upload-zone.has-file .upload-hint{background:rgba(26,46,85,.1);color:var(--navy)}
    .chk-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--g200);border-radius:10px;cursor:pointer;transition:all .15s;user-select:none}
    .chk-opt:hover{border-color:var(--navy-mid);background:var(--navy-lt)}
    .chk-opt.on{border-color:var(--navy);background:var(--navy-lt)}
    .chk-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--g300);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .chk-box.on{background:var(--navy);border-color:var(--navy)}
    .chk-text h4{font-size:13px;font-weight:700;color:var(--g900)}
    .chk-text p{font-size:12px;color:var(--g500);margin-top:3px;line-height:1.4}

    /* 희망대학 입력 */
    .wish-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
    .wish-row input{padding:9px 12px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;width:100%}
    .wish-row input:focus{border-color:var(--navy)}
    .wish-del{width:30px;height:30px;border:none;background:var(--red-bg);color:var(--red);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .wish-add{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed var(--g300);border-radius:8px;background:transparent;color:var(--g500);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;justify-content:center}
    .wish-add:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-lt)}

    .submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid var(--g200);box-shadow:0 -4px 24px rgba(0,0,0,.08);z-index:200}
    .submit-inner{max-width:608px;margin:0 auto}
    .submit-btn{display:block;width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;transition:background .15s;font-family:inherit;letter-spacing:.1px}
    .submit-btn:hover:not(:disabled){background:var(--navy-mid)}
    .submit-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .submit-hint{text-align:center;font-size:11px;color:var(--g400);margin-top:6px}
    .field-err input,.field-err textarea{border-color:var(--red)!important}
    .err-msg{font-size:11px;color:var(--red);margin-top:4px}

    .analyzing-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff}
    .analyzing-inner{max-width:400px;padding:40px 24px;text-align:center;width:100%}
    .analyzing-spinner{width:52px;height:52px;border:3px solid var(--g200);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 28px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .analyzing-inner h2{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-.3px}
    .analyzing-inner>p{font-size:13px;color:var(--g400);margin-bottom:32px}
    .a-steps{text-align:left}
    .a-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100)}
    .a-step:last-child{border-bottom:none}
    .a-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .a-dot.done{background:var(--green-bg);color:var(--green)}
    .a-dot.active{background:var(--navy);color:#fff;animation:blink .9s infinite}
    .a-dot.pending{background:var(--g100);color:var(--g300)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .a-label{font-size:13px;font-weight:600}
    .a-label.done{color:var(--green)}.a-label.active{color:var(--navy)}.a-label.pending{color:var(--g300)}

    .result-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .result-hd h2{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
    .export-btn{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.1px;transition:background .15s}
    .export-btn:hover:not(:disabled){background:var(--navy-mid)}
    .export-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
    .result-strategy{font-size:11px;color:var(--g500);margin-bottom:16px;line-height:1.5}
    .result-section-title{font-size:14px;font-weight:800;color:var(--navy);margin:20px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--navy-lt)}

    .analysis-box{background:#fff;border:1px solid var(--g200);border-radius:14px;padding:18px 20px;margin-bottom:14px}
    .ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .ab-title{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:-.2px}
    .comp-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
    .ab-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .ab-metric{background:var(--g50);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--g100)}
    .ab-metric-lbl{font-size:10px;color:var(--g400);margin-bottom:4px;letter-spacing:.2px}
    .ab-metric-val{font-size:13px;font-weight:800;color:var(--navy)}
    .ab-grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .ab-grade{background:var(--navy-lt);border-radius:8px;padding:8px 10px;text-align:center}
    .ab-grade-lbl{font-size:10px;color:var(--navy-mid);margin-bottom:3px}
    .ab-grade-val{font-size:15px;font-weight:900;color:var(--navy)}
    .ab-year{display:flex;gap:8px;margin-bottom:12px}
    .ab-year-item{flex:1;background:var(--g50);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--g100)}
    .ab-year-lbl{font-size:10px;color:var(--g400);margin-bottom:3px}
    .ab-year-val{font-size:14px;font-weight:800;color:var(--navy)}
    .ab-analysis{font-size:12px;color:var(--g700);line-height:1.65;padding:10px 12px;background:var(--g50);border-radius:8px;margin-bottom:8px}
    .ab-analysis-lbl{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:4px;letter-spacing:.3px}

    .result-card{background:#fff;border-radius:14px;margin-bottom:12px;border:1px solid var(--g200);overflow:hidden}
    .rc-bar{height:3px}
    .rc-body{padding:18px 20px}
    .rc-badges{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
    .rc-poss{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:.3px}
    .rc-type{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.2px;background:var(--navy-lt);color:var(--navy)}
    .rc-region-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:var(--g100);color:var(--g500)}
    .rc-essay-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;background:var(--purple-bg);color:var(--purple)}
    .rc-rank{width:22px;height:22px;background:var(--navy);color:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
    .rc-univ{font-size:18px;font-weight:900;color:var(--g900);letter-spacing:-.5px;margin-bottom:2px}
    .rc-dept-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .rc-category{font-size:11px;font-weight:600;color:var(--g400)}
    .rc-dept{font-size:14px;font-weight:700;color:var(--g700)}
    .rc-program{font-size:12px;color:var(--g400);margin-bottom:12px}
    .rc-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px}
    .rc-table th{background:var(--g50);color:var(--g500);font-weight:600;padding:6px 8px;text-align:center;border:1px solid var(--g100);font-size:11px;letter-spacing:.2px}
    .rc-table td{padding:7px 8px;text-align:center;border:1px solid var(--g100);color:var(--g700);font-weight:600}
    .rc-table td.cut{color:var(--navy);font-weight:800;font-size:13px}
    .rc-meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .rc-meta-item{display:flex;align-items:center;gap:4px}
    .rc-meta-label{font-size:10px;color:var(--g400);font-weight:600;letter-spacing:.3px}
    .rc-meta-val{font-size:12px;color:var(--g700);font-weight:700}
    .rc-suneung{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:10px}
    .rc-suneung.has{background:var(--orange-bg);color:var(--orange)}
    .rc-suneung.none{background:var(--green-bg);color:var(--green)}
    .rc-method{font-size:11px;color:var(--g500);margin-bottom:10px;line-height:1.5}
    .rc-report{font-size:12px;color:var(--g700);line-height:1.7;padding-top:10px;border-top:1px solid var(--g100)}

    @media(max-width:500px){
      .mode-grid{grid-template-columns:1fr}
